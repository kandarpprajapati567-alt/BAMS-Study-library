<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMHITA.SYNC | BAMS Master OS</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@500;700;900&display=swap');

        :root {
            --bg-color: #030407;
            --primary-color: #00ffcc;
            --text-main: #ffffff;
            --text-muted: #8a9bb3;
            --border-color: #222;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color);
            color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        /* --- DASHBOARD --- */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; border-bottom: 1px solid var(--border-color);
        }

        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary-color); }
        .role-badge { border: 1px solid var(--primary-color); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }

        .dashboard-content { padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        /* --- GRID CARDS (NO 3D) --- */
        .module-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-top: 40px;
        }

        .card {
            background: #0f1419; border: 1px solid var(--border-color);
            padding: 30px; border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--primary-color); }
        .card-icon { font-size: 2.5rem; margin-bottom: 15px; }
        .card-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 10px; }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center;
        }
        .modal-box {
            background: #0a0a0a; border: 1px solid var(--border-color);
            padding: 40px; border-radius: 12px; width: 90%; max-width: 600px;
        }

        .close-btn { cursor: pointer; float: right; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-nav">
        <h2 class="brand-name">CHARAK.OS</h2>
        <div class="role-badge" id="ui-role-badge">UG SCHOLAR</div>
    </div>

    <div class="dashboard-content">
        <h1>Command Center.</h1>
        <p>System ready. Select a module.</p>

        <div class="module-grid">
            <div class="card" onclick="alert('Smart Vault Open')">
                <div class="card-icon">📁</div>
                <h3 class="card-title">Smart Vault</h3>
            </div>
            <div class="card" onclick="alert('Shloka Matrix Open')">
                <div class="card-icon">📖</div>
                <h3 class="card-title">Shloka Matrix</h3>
            </div>
            <div class="card" onclick="alert('MCQ Engine Open')">
                <div class="card-icon">🎯</div>
                <h3 class="card-title">MCQ Engine</h3>
            </div>
            <div class="card" onclick="alert('PYQ Archive Open')">
                <div class="card-icon">⏳</div>
                <h3 class="card-title">PYQ Archive</h3>
            </div>
        </div>
    </div>

</body>
</html>
